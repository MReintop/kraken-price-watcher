name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch makes an in-flight run redundant.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # The lockfile is written by npm 11; npm 10 rejects it as out of sync.
      - name: Use the npm that writes the lockfile
        run: npm install -g npm@11

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run format:check

      # Not `npm test`: jest only enforces coverageThreshold under --coverage.
      - run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      # Catches the drift a tilde range hides: package.json can look right while
      # the lockfile reproduces an older, incompatible set.
      - name: Expo compatibility
        run: |
          npx expo-doctor
          npx expo install --check

      # Exports the app, so this is also the release-build gate.
      - run: npm run check:bundle

name: e2e-test

on:
  pull_request:
    branches: ['*']

jobs:
  build_android_for_e2e:
    type: build
    params:
      platform: android
      profile: e2e-test

  maestro_test:
    needs: [build_android_for_e2e]
    type: maestro
    params:
      build_id: ${{ needs.build_android_for_e2e.outputs.build_id }}
      # live-ticks is excluded: it needs the local fixture stub, which cannot
      # exist on a cloud device. Run it locally with `npm run stub`.
      flow_path:
        - .maestro/markets.yaml
        - .maestro/coin-detail.yaml

# Tagged `stub`: it needs the fixture upstreams on the same host as the emulator,
# which CI provides and a bare `maestro test` against the live market does not —
# there, a quiet minute means no tick and the assertion becomes a coin flip.
#
#   npm run stub          # then, in another shell:
#   maestro test .maestro/live-ticks.yaml
#
# This is the flow only e2e can do: jest stubs the socket, so the app's own
# WebSocket client is never exercised there.
appId: com.mreintop.krakenpricewatcher
tags:
  - stub
---
- launchApp:
    clearState: true

- assertVisible: 'Bitcoin'

# Seeded from Kraken's Ticker before the socket connects. The tenths digit is
# BTC/USD's real precision (pair_decimals=1), so it must reach the screen.
- assertVisible: '$62,888.0'

# Once subscribed, the badge flips.
- assertVisible: 'Live'

# The stub walks prices upward by a fixed step per tick, so the seeded value must
# stop being current on its own — no interaction.
- extendedWaitUntil:
    notVisible: '$62,888.0'
    timeout: 20000
